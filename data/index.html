<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ยอดขายรายบุคคล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f1f5f9;
        }
        .chart-container {
            position: relative;
            height: 50vh;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
        }
        .table-container::-webkit-scrollbar {
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navbar / Header -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex flex-wrap justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-tight">ระบบวิเคราะห์ยอดขาย</h1>
                <p class="text-xs text-gray-500 font-medium">Real-time Performance Tracking</p>
            </div>
        </div>
        
        <div class="flex flex-wrap items-center gap-3 mt-4 lg:mt-0">
            <div class="relative">
                <select id="filterMonth" class="appearance-none bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-40 p-2.5 pr-8 transition shadow-sm">
                    <option value="all">🗓️ ทุกช่วงเวลา</option>
                </select>
            </div>
            
            <div class="relative">
                <select id="filterPerson" class="appearance-none bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-44 p-2.5 pr-8 transition shadow-sm">
                    <option value="all">👤 พนักงานทุกคน</option>
                </select>
            </div>

            <button onclick="fetchData()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-lg transition duration-200 shadow-md shadow-indigo-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                รีเฟรช
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 max-w-[1600px] mx-auto space-y-6">
        
        <div id="loading" class="hidden fixed inset-0 bg-slate-900/10 backdrop-blur-[2px] z-[60] flex items-center justify-center">
            <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
                <p class="mt-4 text-indigo-600 font-semibold">กำลังโหลดข้อมูล...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card p-6 border-t-4 border-t-indigo-500">
                <div class="flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">ยอดรวมสุทธิ</p>
                    <div class="bg-indigo-50 p-2 rounded-lg text-indigo-600">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"></path></svg>
                    </div>
                </div>
                <h2 id="totalSales" class="text-2xl font-bold text-gray-800 mt-2">฿0.00</h2>
            </div>
            <div class="card p-6 border-t-4 border-t-emerald-500">
                <div class="flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">ยอดบริษัท GFS</p>
                    <div class="bg-emerald-50 p-2 rounded-lg text-emerald-600 text-xs font-bold px-3">GFS</div>
                </div>
                <h2 id="totalGFS" class="text-2xl font-bold text-gray-800 mt-2">฿0.00</h2>
            </div>
            <div class="card p-6 border-t-4 border-t-blue-500">
                <div class="flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">ยอดบริษัท MHL</p>
                    <div class="bg-blue-50 p-2 rounded-lg text-blue-600 text-xs font-bold px-3">MHL</div>
                </div>
                <h2 id="totalMHL" class="text-2xl font-bold text-gray-800 mt-2">฿0.00</h2>
            </div>
            <div class="card p-6 border-t-4 border-t-orange-500 bg-orange-50/20">
                <div class="flex items-center justify-between">
                    <p class="text-xs text-orange-500 font-bold uppercase tracking-wider">TOP PERFORMER</p>
                    <div class="bg-orange-100 p-2 rounded-lg text-orange-600">🏆</div>
                </div>
                <h2 id="topPerformer" class="text-2xl font-bold text-gray-800 mt-2">-</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="card p-6 bg-white">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h3 class="text-lg font-bold text-gray-800">กราฟเปรียบเทียบผลงาน</h3>
                        <p class="text-sm text-gray-500">วิเคราะห์ยอดขายแยกตามบริษัทและยอดรวมสะสม</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="flex items-center gap-2 text-xs font-semibold text-gray-600">
                            <span class="inline-block w-4 h-2 bg-blue-500 rounded-full shadow-sm"></span> MHL
                        </div>
                        <div class="flex items-center gap-2 text-xs font-semibold text-gray-600">
                            <span class="inline-block w-4 h-2 bg-emerald-500 rounded-full shadow-sm"></span> GFS
                        </div>
                        <div class="flex items-center gap-2 text-xs font-semibold text-orange-500">
                            <span class="inline-block w-6 h-0.5 border-t-2 border-orange-400"></span> ยอดรวม 2 บริษัท
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-700">รายการข้อมูลทั้งหมด</h3>
            </div>
            <div class="table-container overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="text-xs font-bold text-gray-500 uppercase bg-gray-100/50 sticky top-0">
                        <tr id="tableHeader">
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = '1Ag7yh0SFSqGfm3LTNinHwlwV6h5Xa4M2yIuf03mq2uc';
        const TAB_NAME = 'ยอดขายรายบุคคล';

        let rawData = [];
        let staffNames = [];
        let salesChart = null;

        const monthNamesThai = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        const monthOrder = { 'ม.ค.': 1, 'ก.พ.': 2, 'มี.ค.': 3, 'เม.ย.': 4, 'พ.ค.': 5, 'มิ.ย.': 6, 'ก.ค.': 7, 'ส.ค.': 8, 'ก.ย.': 9, 'ต.ค.': 10, 'พ.ย.': 11, 'ธ.ค.': 12 };

        window.onload = () => {
            fetchData();
            document.getElementById('filterMonth').addEventListener('change', updateDisplay);
            document.getElementById('filterPerson').addEventListener('change', updateDisplay);
        };

        async function fetchData() {
            showLoading(true);
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(TAB_NAME)}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                processSheetData(json.table);
            } catch (error) {
                console.error("Fetch Error:", error);
            } finally {
                showLoading(false);
            }
        }

        // ฟังก์ชันช่วยแปลงค่า "Date(2025,0,1)" เป็น "ม.ค. 25" หรือรูปแบบที่ต้องการ
        function formatMonthValue(val) {
            if (!val) return "";
            if (typeof val === 'string' && val.startsWith('Date(')) {
                // แยกค่าจาก Date(2025,0,1)
                const parts = val.match(/\d+/g);
                if (parts && parts.length >= 2) {
                    const yearFull = parseInt(parts[0]);
                    const monthIdx = parseInt(parts[1]);
                    const yearShort = yearFull.toString().slice(-2);
                    return `${monthNamesThai[monthIdx]} ${yearShort}`;
                }
            }
            // ถ้าเป็นรูปแบบอื่นๆ หรือ String อยู่แล้ว
            return val;
        }

        function sortMonths(months) {
            return months.sort((a, b) => {
                const [m1, y1] = a.split(' ');
                const [m2, y2] = b.split(' ');
                if (y1 !== y2) return parseInt(y1) - parseInt(y2);
                return monthOrder[m1] - monthOrder[m2];
            });
        }

        function processSheetData(table) {
            staffNames = table.cols.slice(2).map(col => col.label || "").filter(n => n && !n.includes('Column'));
            
            rawData = table.rows.map(row => {
                // แก้ไขการดึงเดือนตรงนี้
                let rawMonth = row.c[1]?.v || "";
                let formattedMonth = formatMonthValue(rawMonth);

                const item = {
                    company: row.c[0]?.v || "",
                    month: formattedMonth,
                    sales: {}
                };
                
                staffNames.forEach((name, index) => {
                    const cellVal = row.c[index + 2]?.v;
                    item.sales[name] = typeof cellVal === 'number' ? cellVal : 0;
                });
                return item;
            }).filter(item => item.company && item.month);

            updateFilters();
            updateDisplay();
        }

        function updateFilters() {
            const monthSelect = document.getElementById('filterMonth');
            const personSelect = document.getElementById('filterPerson');
            
            const months = sortMonths([...new Set(rawData.map(d => d.month))]);
            
            monthSelect.innerHTML = '<option value="all">🗓️ ทุกช่วงเวลา</option>';
            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                monthSelect.appendChild(opt);
            });

            personSelect.innerHTML = '<option value="all">👤 พนักงานทุกคน</option>';
            staffNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                personSelect.appendChild(opt);
            });
        }

        function updateDisplay() {
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedPerson = document.getElementById('filterPerson').value;

            let filtered = rawData;
            if (selectedMonth !== 'all') {
                filtered = filtered.filter(d => d.month === selectedMonth);
            }

            let totalAll = 0, totalGFS = 0, totalMHL = 0;
            let personTotals = {};
            staffNames.forEach(n => personTotals[n] = 0);

            filtered.forEach(item => {
                staffNames.forEach(n => {
                    const val = item.sales[n];
                    totalAll += val;
                    personTotals[n] += val;
                    if (item.company === 'GFS') totalGFS += val;
                    if (item.company === 'MHL') totalMHL += val;
                });
            });

            document.getElementById('totalSales').textContent = '฿' + totalAll.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalGFS').textContent = '฿' + totalGFS.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalMHL').textContent = '฿' + totalMHL.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            let topStaff = Object.entries(personTotals).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('topPerformer').textContent = (topStaff && topStaff[1] > 0) ? topStaff[0] : '-';

            renderChart(filtered, selectedPerson);
            renderTable(filtered);
        }

        function renderChart(data, selectedPerson) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            let displayStaff = selectedPerson === 'all' ? staffNames : [selectedPerson];
            
            const mhlData = displayStaff.map(name => 
                data.filter(d => d.company === 'MHL').reduce((sum, d) => sum + d.sales[name], 0)
            );
            const gfsData = displayStaff.map(name => 
                data.filter(d => d.company === 'GFS').reduce((sum, d) => sum + d.sales[name], 0)
            );
            const lineData = displayStaff.map((_, i) => mhlData[i] + gfsData[i]);

            if (salesChart) salesChart.destroy();

            salesChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: displayStaff,
                    datasets: [
                        {
                            label: 'MHL Sales',
                            data: mhlData,
                            backgroundColor: '#3b82f6',
                            borderRadius: 6,
                            stack: 'company'
                        },
                        {
                            label: 'GFS Sales',
                            data: gfsData,
                            backgroundColor: '#10b981',
                            borderRadius: 6,
                            stack: 'company'
                        },
                        {
                            label: 'Total',
                            data: lineData,
                            type: 'line',
                            borderColor: '#f97316',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#f97316',
                            pointRadius: 5,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { callback: v => v >= 1000 ? (v/1000).toLocaleString() + 'k' : v }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(data) {
            const headerRow = document.getElementById('tableHeader');
            const tableBody = document.getElementById('tableBody');
            
            headerRow.innerHTML = `
                <th class="px-6 py-4 border-b">บริษัท</th>
                <th class="px-6 py-4 border-b text-center">เดือนที่ติดตั้ง</th>
                ${staffNames.map(n => `<th class="px-6 py-4 border-b text-right">${n}</th>`).join('')}
            `;

            tableBody.innerHTML = data.map(item => `
                <tr class="hover:bg-indigo-50/30 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ${item.company === 'GFS' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">
                            ${item.company}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center whitespace-nowrap">
                        <span class="bg-slate-100 px-3 py-1 rounded-md text-xs border border-slate-200">${item.month}</span>
                    </td>
                    ${staffNames.map(n => `
                        <td class="px-6 py-4 text-right tabular-nums text-gray-700 font-medium ${item.sales[n] === 0 ? 'text-gray-300' : ''}">
                            ${item.sales[n] > 0 ? '฿' + item.sales[n].toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        function showLoading(isLoading) {
            document.getElementById('loading').classList.toggle('hidden', !isLoading);
        }
    </script>
</body>
</html>
